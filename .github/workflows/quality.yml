name: quality

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Verify frontend and browser engine
        run: npm run check
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Verify Worker API
        run: npm run check && npm run audit
        working-directory: backend
